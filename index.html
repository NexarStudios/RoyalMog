<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoyalMog — Scheduled Maintenance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital@0;1&family=DM+Sans:wght@300;400;500&family=Cormorant+SC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0e0c07;
    font-family: 'DM Sans', sans-serif;
    color: #ddd5c0;
    padding: 2rem;
  }

  .glow-1 {
    position: fixed; top: -140px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 320px;
    background: radial-gradient(ellipse, rgba(196,160,80,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .glow-2 {
    position: fixed; bottom: -120px; right: -100px;
    width: 500px; height: 350px;
    background: radial-gradient(ellipse, rgba(196,160,80,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  .site-label {
    font-family: 'Cormorant SC', serif;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: rgba(196,160,80,0.45);
    text-transform: uppercase;
    margin-bottom: 2.2rem;
  }

  .card {
    position: relative;
    max-width: 500px;
    width: 100%;
    background: linear-gradient(160deg, #1c1409 0%, #221809 50%, #1a1208 100%);
    border: 1px solid rgba(196,160,80,0.28);
    border-radius: 18px;
    padding: 3.2rem 3rem 2.8rem;
    text-align: center;
    box-shadow:
      0 0 0 1px rgba(196,160,80,0.06) inset,
      0 30px 80px rgba(0,0,0,0.65),
      0 6px 24px rgba(196,160,80,0.05);
  }

  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 58px; height: 58px;
    border-color: rgba(196,160,80,0.28);
    border-style: solid;
  }
  .card::before { top: 14px; left: 14px; border-width: 1px 0 0 1px; border-radius: 5px 0 0 0; }
  .card::after  { bottom: 14px; right: 14px; border-width: 0 1px 1px 0; border-radius: 0 0 5px 0; }

  .crown {
    font-size: 2.2rem;
    line-height: 1;
    margin-bottom: 1.6rem;
    display: block;
    animation: float 4s ease-in-out infinite;
    filter: drop-shadow(0 0 14px rgba(196,160,80,0.55));
  }

  @keyframes float {
    0%, 100% { transform: translateY(0);    filter: drop-shadow(0 0 10px rgba(196,160,80,0.45)); }
    50%       { transform: translateY(-5px); filter: drop-shadow(0 0 22px rgba(196,160,80,0.8)); }
  }

  .eyebrow {
    font-family: 'Cormorant SC', serif;
    font-size: 0.6rem;
    letter-spacing: 0.28em;
    color: rgba(196,160,80,0.55);
    text-transform: uppercase;
    margin-bottom: 0.7rem;
  }

  h1 {
    font-family: 'Cormorant SC', serif;
    font-size: 1.9rem;
    font-weight: 600;
    color: #edd98a;
    letter-spacing: 0.03em;
    line-height: 1.2;
  }

  .rule {
    width: 44px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(196,160,80,0.5), transparent);
    margin: 1.1rem auto;
  }

  .message {
    font-size: 0.88rem;
    font-weight: 300;
    color: rgba(220,205,175,0.72);
    line-height: 1.75;
    max-width: 360px;
    margin: 0 auto;
  }

  .time-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.8rem;
    margin-top: 1.6rem;
    padding: 0.8rem 1.9rem;
    border-radius: 10px;
    background: linear-gradient(135deg, rgba(196,160,80,0.1) 0%, rgba(196,160,80,0.06) 100%);
    border: 1px solid rgba(196,160,80,0.3);
    box-shadow: 0 0 0 1px rgba(196,160,80,0.06) inset;
  }

  .time-badge .clock-icon {
    font-size: 1rem;
    opacity: 0.6;
  }

  .time-badge .time-main {
    font-family: 'Cormorant SC', serif;
    font-size: 1.3rem;
    font-weight: 600;
    color: #edd98a;
    letter-spacing: 0.06em;
    line-height: 1;
  }

  .time-badge .time-tz {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.68rem;
    font-weight: 400;
    color: rgba(196,160,80,0.55);
    letter-spacing: 0.07em;
    margin-top: 0.25rem;
    text-transform: uppercase;
  }

  .lower-rule {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(196,160,80,0.15), transparent);
    margin: 2rem 0 1.5rem;
  }

  .sorry {
    font-family: 'Libre Baskerville', serif;
    font-style: italic;
    font-size: 0.8rem;
    color: rgba(196,160,80,0.42);
    line-height: 1.65;
  }

  .footer {
    margin-top: 2.2rem;
    font-size: 0.68rem;
    font-weight: 300;
    color: rgba(196,160,80,0.25);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  @media (max-width: 480px) {
    .card { padding: 2.4rem 1.8rem 2.2rem; }
    h1 { font-size: 1.55rem; }
  }
</style>
</head>
<body>
<div class="glow-1"></div>
<div class="glow-2"></div>

<div class="site-label">royalmog.org</div>

<div class="card">
  <span class="crown">♛</span>
  <div class="eyebrow">Scheduled Maintenance</div>
  <h1>We'll Be Right Back</h1>
  <div class="rule"></div>
  <p class="message">
    RoyalMog is currently undergoing scheduled maintenance. The site will return online by:
  </p>

  <div class="time-badge">
    <span class="clock-icon">⏱</span>
    <div>
      <div class="time-main">23:00</div>
      <div class="time-tz">GMT+2 &nbsp;·&nbsp; Central European Summer Time</div>
    </div>
  </div>

  <div class="lower-rule"></div>
  <p class="sorry">We apologise for the inconvenience — the court will return shortly.</p>
</div>

<div class="footer">© RoyalMog &nbsp;·&nbsp; All rights reserved</div>

</body>
</html>
