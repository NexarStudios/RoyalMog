<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoyalMog — Who Reigns Supreme?</title>
<meta name="description" content="RoyalMog — vote for the best prince or princess and see live royal rankings.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Jost:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

<style>
/* ─────────────────────────────────────────
   RESET & TOKENS
───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }

:root {
  --bg:       #09090d;
  --s1:       #0f0f16;
  --s2:       #141420;
  --s3:       #1a1a28;
  --border:   rgba(255,255,255,0.06);
  --border2:  rgba(255,255,255,0.11);
  --gold:     #c9a84c;
  --gold2:    #e8cc78;
  --gold3:    rgba(201,168,76,0.12);
  --silver:   #a8a8be;
  --bronze:   #a07850;
  --txt:      #edeade;
  --txt2:     rgba(237,234,222,0.52);
  --txt3:     rgba(237,234,222,0.26);
  --tiktok:   #ff2d55;
  --r:        14px;
  --r2:       9px;
  --nav-h:    58px;
}

body {
  background: var(--bg);
  color: var(--txt);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── ambient glows ── */
.gl { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(130px); }
.gl-a { width: 700px; height: 500px; top: -160px; left: -200px; background: radial-gradient(ellipse, rgba(201,168,76,.06) 0%, transparent 65%); }
.gl-b { width: 600px; height: 600px; bottom: -200px; right: -180px; background: radial-gradient(ellipse, rgba(90,70,200,.045) 0%, transparent 65%); }

/* ── grain overlay ── */
body::after {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9998;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='.04'/%3E%3C/svg%3E");
  background-size: 180px; opacity: .4;
}

/* ─────────────────────────────────────────
   NAV / HEADER
───────────────────────────────────────── */
.site-nav {
  position: sticky; top: 0; z-index: 200;
  height: var(--nav-h);
  background: rgba(9,9,13,.88);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
}

.nav-inner {
  width: 100%; max-width: 1100px; margin: 0 auto;
  padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
}

.nav-brand {
  font-family: 'Cinzel', serif;
  font-size: 19px; font-weight: 600;
  letter-spacing: 3px; color: var(--gold2);
  text-decoration: none;
  text-shadow: 0 0 28px rgba(201,168,76,.35);
}
.nav-brand span { color: var(--txt3); font-weight: 400; }

.nav-tabs { display: flex; gap: 2px; }

.nav-tab {
  font-family: 'Jost', sans-serif;
  font-size: 11px; font-weight: 500; letter-spacing: 2.5px;
  text-transform: uppercase; color: var(--txt3);
  padding: 7px 16px; border-radius: 6px;
  cursor: pointer; border: none; background: transparent;
  transition: color .2s, background .2s;
}
.nav-tab:hover { color: var(--txt2); background: rgba(255,255,255,.04); }
.nav-tab.active { color: var(--gold2); background: var(--gold3); }

/* ─────────────────────────────────────────
   HERO
───────────────────────────────────────── */
.hero {
  position: relative; z-index: 1;
  text-align: center;
  padding: 60px 24px 48px;
  border-bottom: 1px solid var(--border);
}

.hero-eyebrow {
  font-size: 10px; font-weight: 500; letter-spacing: 5px;
  text-transform: uppercase; color: var(--gold); opacity: .6;
  margin-bottom: 20px;
}

.hero-logo img {
  max-height: 90px; max-width: 440px; width: 90%;
  display: block; margin: 0 auto;
  filter: drop-shadow(0 0 28px rgba(201,168,76,.22));
}
.hero-logo .hero-fallback {
  font-family: 'Cinzel', serif;
  font-size: clamp(2rem, 7vw, 4rem);
  font-weight: 700; letter-spacing: 10px;
  color: var(--gold2);
  text-shadow: 0 0 40px rgba(201,168,76,.3);
  display: none;
}

.hero-tagline {
  font-size: 15px; font-style: italic;
  color: var(--txt2); margin-top: 12px;
  font-weight: 300;
}

.hero-rule {
  width: 50px; height: 1px; margin: 20px auto 0;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

/* ─────────────────────────────────────────
   LAYOUT WRAPPER
───────────────────────────────────────── */
.page { max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; position: relative; z-index: 1; }

.panel { display: none; padding-top: 40px; }
.panel.active { display: block; animation: fadeUp .3s ease both; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

/* ─────────────────────────────────────────
   SECTION HEADER
───────────────────────────────────────── */
.s-head {
  display: flex; align-items: baseline;
  justify-content: space-between; margin-bottom: 28px; gap: 12px;
}
.s-title {
  font-family: 'Cinzel', serif;
  font-size: 20px; font-weight: 600; letter-spacing: 2px; color: var(--txt);
}
.s-meta { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--txt3); white-space: nowrap; }

/* ─────────────────────────────────────────
   PODIUM (top 3)
───────────────────────────────────────── */
.podium {
  display: grid; grid-template-columns: 1fr 1.12fr 1fr;
  gap: 12px; margin-bottom: 24px; align-items: end;
}

.pod {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden;
  display: flex; flex-direction: column; align-items: center;
  text-align: center; transition: border-color .2s;
}
.pod.p1 { border-color: rgba(201,168,76,.35); box-shadow: 0 0 50px rgba(201,168,76,.07); }
.pod.p2 { border-color: rgba(168,168,190,.18); }
.pod.p3 { border-color: rgba(160,120,80,.2); }

/* photo area */
.pod-img-wrap {
  width: 100%; aspect-ratio: 3/2; overflow: hidden;
  background: var(--s2); position: relative;
  flex-shrink: 0;
}
.pod-img-wrap img {
  width: 100%; height: 100%; object-fit: cover; object-position: top center;
  display: block; transition: transform .4s ease;
}
.pod:hover .pod-img-wrap img { transform: scale(1.04); }
.pod-img-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 40px; color: var(--txt3);
  background: linear-gradient(160deg, var(--s2), var(--s3));
}
.pod.p1 .pod-img-placeholder { font-size: 48px; }

.pod-medal-bar {
  width: 100%; padding: 6px 10px 0;
  display: flex; align-items: center; justify-content: center;
  gap: 6px;
}
.pod-rank-badge {
  font-family: 'Cinzel', serif; font-size: 9px;
  font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
  padding: 3px 10px; border-radius: 20px;
}
.pod.p1 .pod-rank-badge { color: var(--gold); background: rgba(201,168,76,.14); border: 1px solid rgba(201,168,76,.3); }
.pod.p2 .pod-rank-badge { color: var(--silver); background: rgba(168,168,190,.1); border: 1px solid rgba(168,168,190,.25); }
.pod.p3 .pod-rank-badge { color: var(--bronze); background: rgba(160,120,80,.1); border: 1px solid rgba(160,120,80,.22); }

.pod-body { padding: 10px 12px 14px; width: 100%; }
.pod-type { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--txt3); margin-bottom: 3px; }
.pod-name { font-family: 'Cinzel', serif; font-size: 14px; font-weight: 600; color: var(--txt); margin-bottom: 2px; line-height: 1.2; }
.pod.p1 .pod-name { font-size: 16px; color: var(--gold2); }
.pod-votes { font-size: 22px; font-weight: 300; color: var(--txt); margin: 4px 0 2px; }
.pod.p1 .pod-votes { font-size: 28px; color: var(--gold2); }
.pod-pct { font-size: 10px; color: var(--txt3); margin-bottom: 10px; }

.tt-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 5px;
  font-family: 'Jost', sans-serif; font-size: 10px; font-weight: 500;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--tiktok); text-decoration: none;
  background: rgba(255,45,85,.08); border: 1px solid rgba(255,45,85,.22);
  padding: 5px 13px; border-radius: 20px;
  transition: background .18s, border-color .18s, transform .15s;
}
.tt-btn:hover { background: rgba(255,45,85,.18); border-color: rgba(255,45,85,.5); transform: translateY(-1px); }
.tt-btn svg { width: 11px; height: 11px; fill: currentColor; flex-shrink: 0; }

/* ─────────────────────────────────────────
   RANK LIST (positions 4+)
───────────────────────────────────────── */
.rank-list { display: flex; flex-direction: column; gap: 3px; }

.rank-row {
  display: grid;
  grid-template-columns: 36px 1fr 100px 44px auto;
  align-items: center; gap: 14px;
  padding: 11px 16px; border-radius: var(--r2);
  background: var(--s1); border: 1px solid transparent;
  transition: background .16s, border-color .16s;
  animation: rowIn .4s ease both;
}
@keyframes rowIn { from { opacity:0; transform:translateX(-5px); } to { opacity:1; transform:none; } }
.rank-row:hover { background: var(--s2); border-color: var(--border); }

.rank-num { font-family: 'Cinzel', serif; font-size: 13px; color: var(--txt3); text-align: center; }
.rank-name { font-size: 13px; font-weight: 500; color: var(--txt); }
.rank-type { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--txt3); margin-top: 2px; }
.rank-bar  { display: flex; align-items: center; gap: 6px; }
.rank-track { flex: 1; height: 3px; background: rgba(255,255,255,.05); border-radius: 2px; overflow: hidden; }
.rank-fill  { height: 3px; background: linear-gradient(90deg, var(--gold), var(--gold2)); border-radius: 2px; transition: width 1s cubic-bezier(.4,0,.2,1); }
.rank-pct  { font-size: 11px; color: var(--txt3); font-weight: 500; text-align: right; }

.rank-tt {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 9px; font-weight: 500; letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--tiktok); background: rgba(255,45,85,.07); border: 1px solid rgba(255,45,85,.18);
  padding: 4px 10px; border-radius: 20px; text-decoration: none; white-space: nowrap;
  transition: background .18s, border-color .18s;
}
.rank-tt:hover { background: rgba(255,45,85,.18); border-color: rgba(255,45,85,.5); }
.rank-tt svg { width: 9px; height: 9px; fill: currentColor; }

/* ─────────────────────────────────────────
   STATES
───────────────────────────────────────── */
.empty-state {
  text-align: center; padding: 60px 24px;
  color: var(--txt3); font-size: 14px; font-style: italic;
}
.empty-state .e-crown { font-size: 36px; display: block; margin-bottom: 12px; opacity: .22; }

.loading-state { text-align: center; padding: 48px 24px; color: var(--txt3); font-size: 12px; letter-spacing: 3px; text-transform: uppercase; }
.spinner { width: 22px; height: 22px; border: 2px solid var(--border2); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─────────────────────────────────────────
   VOTE PANEL
───────────────────────────────────────── */
.vote-head { margin-bottom: 28px; }
.vote-title { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 600; letter-spacing: 2px; margin-bottom: 6px; }
.vote-sub   { font-size: 14px; color: var(--txt2); font-style: italic; font-weight: 300; }

/* Search */
.search-wrap { position: relative; margin-bottom: 28px; }
.search-ico  { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--txt3); pointer-events: none; line-height: 0; }
.search-ico svg { display: block; width: 15px; height: 15px; }

.search-input {
  width: 100%; background: var(--s1); border: 1px solid var(--border2);
  border-radius: var(--r); color: var(--txt);
  font-family: 'Jost', sans-serif; font-size: 14px; font-weight: 300;
  padding: 13px 16px 13px 42px; outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.search-input::placeholder { color: var(--txt3); }
.search-input:focus { border-color: rgba(201,168,76,.45); box-shadow: 0 0 0 3px rgba(201,168,76,.07); }

/* Section labels */
.cand-sec-label {
  font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--txt3);
  margin: 28px 0 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
}

/* ─── Candidate Grid ─── */
.cand-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
}

.cand-card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden;
  cursor: pointer; transition: border-color .18s, transform .18s, box-shadow .18s;
  user-select: none; position: relative;
}
.cand-card:hover { border-color: var(--border2); transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,.4); }
.cand-card.selected { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold), 0 8px 30px rgba(201,168,76,.15); transform: translateY(-3px); }
.cand-card.hidden { display: none; }

/* check badge */
.cand-check {
  position: absolute; top: 9px; right: 9px; z-index: 10;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--gold); display: flex; align-items: center; justify-content: center;
  opacity: 0; transform: scale(.4); transition: opacity .17s, transform .17s;
  box-shadow: 0 2px 8px rgba(0,0,0,.5);
}
.cand-check svg { width: 10px; height: 10px; stroke: #09090d; stroke-width: 2.5; fill: none; }
.cand-card.selected .cand-check { opacity: 1; transform: scale(1); }

/* photo */
.cand-img-wrap {
  width: 100%; aspect-ratio: 4/3; overflow: hidden;
  background: var(--s2); position: relative;
}
.cand-img-wrap img {
  width: 100%; height: 100%; object-fit: cover; object-position: top center;
  display: block; transition: transform .35s ease;
}
.cand-card:hover .cand-img-wrap img { transform: scale(1.05); }
.cand-no-img {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 34px; color: var(--txt3);
  background: linear-gradient(150deg, var(--s2) 0%, var(--s3) 100%);
}

/* card body */
.cand-body { padding: 11px 12px 12px; }
.cand-type { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--txt3); margin-bottom: 3px; }
.cand-name { font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600; color: var(--txt); margin-bottom: 10px; line-height: 1.2; }

/* card footer with TikTok */
.cand-footer {
  display: flex; align-items: center; justify-content: space-between; gap: 6px;
}

.cand-select-hint {
  font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--txt3); transition: color .18s;
}
.cand-card.selected .cand-select-hint { color: var(--gold); }

.cand-tt {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: 'Jost', sans-serif; font-size: 9px; font-weight: 500;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--tiktok); background: rgba(255,45,85,.08);
  border: 1px solid rgba(255,45,85,.2);
  padding: 4px 9px; border-radius: 20px; text-decoration: none;
  transition: background .18s, border-color .18s;
  flex-shrink: 0;
}
.cand-tt:hover { background: rgba(255,45,85,.2); border-color: rgba(255,45,85,.5); }
.cand-tt svg { width: 9px; height: 9px; fill: currentColor; }

.no-results { text-align: center; padding: 40px 24px; color: var(--txt3); font-style: italic; display: none; }

/* ─────────────────────────────────────────
   VOTE ACTION BAR
───────────────────────────────────────── */
.vote-action {
  position: sticky; bottom: 0; z-index: 50;
  background: rgba(9,9,13,.92); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  margin: 0 -24px; padding: 16px 24px;
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
}

.btn-primary {
  font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 600;
  letter-spacing: 3px; text-transform: uppercase;
  background: var(--gold); color: #09090d;
  border: none; padding: 13px 28px; border-radius: 50px; cursor: pointer;
  transition: background .18s, transform .14s, box-shadow .18s;
  box-shadow: 0 4px 20px rgba(201,168,76,.3);
}
.btn-primary:hover { background: var(--gold2); transform: translateY(-1px); box-shadow: 0 6px 28px rgba(201,168,76,.45); }
.btn-primary:active { transform: scale(.97); }
.btn-primary:disabled { opacity: .28; cursor: not-allowed; transform: none; box-shadow: none; }

.voted-badge {
  display: none; align-items: center; gap: 8px;
  font-size: 12px; color: var(--gold);
  border: 1px solid rgba(201,168,76,.3); background: rgba(201,168,76,.07);
  padding: 9px 18px; border-radius: 50px;
}

.vote-selected-label { font-size: 13px; color: var(--txt2); font-style: italic; }

/* ─────────────────────────────────────────
   TOAST
───────────────────────────────────────── */
.toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--s2); border: 1px solid var(--border2); border-radius: 50px;
  padding: 11px 22px; font-size: 13px; color: var(--txt); white-space: nowrap;
  opacity: 0; pointer-events: none; z-index: 9999;
  transition: opacity .22s, transform .22s;
  box-shadow: 0 8px 32px rgba(0,0,0,.55);
  max-width: calc(100vw - 40px); text-align: center; white-space: normal;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { border-color: rgba(201,168,76,.4); color: var(--gold2); }
.toast.error   { border-color: rgba(220,80,80,.3); color: #e08080; }

/* ─────────────────────────────────────────
   RESPONSIVE
───────────────────────────────────────── */
@media (max-width: 700px) {
  .hero { padding: 40px 20px 36px; }
  .page { padding: 0 16px 100px; }
  .vote-action { margin: 0 -16px; padding: 14px 16px; }

  /* podium on mobile: stack vertically */
  .podium {
    grid-template-columns: 1fr;
    gap: 10px;
  }
  .pod-img-wrap { aspect-ratio: 16/7; }

  .rank-row {
    grid-template-columns: 30px 1fr auto;
    gap: 10px;
  }
  .rank-bar, .rank-pct { display: none; }

  .cand-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 9px; }

  .nav-brand span { display: none; }
  .nav-tab { padding: 7px 11px; font-size: 10px; }
}

@media (max-width: 420px) {
  .cand-grid { grid-template-columns: 1fr 1fr; }
  .hero-logo .hero-fallback { letter-spacing: 5px; }
}
</style>
</head>
<body>

<div class="gl gl-a"></div>
<div class="gl gl-b"></div>

<!-- ═══ NAV ═══ -->
<nav class="site-nav">
  <div class="nav-inner">
    <a class="nav-brand" href="#">RoyalMog <span>♛</span></a>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchTab('rankings', this)">Rankings</button>
      <button class="nav-tab"        onclick="switchTab('vote', this)">Vote</button>
    </div>
  </div>
</nav>

<!-- ═══ HERO ═══ -->
<div class="hero">
  <div class="hero-eyebrow">♦ &nbsp; The Royal Poll &nbsp; ♦</div>
  <div class="hero-logo">
    <img src="Title1.png" alt="RoyalMog"
      onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
    <div class="hero-fallback">RoyalMog</div>
  </div>
  <p class="hero-tagline">Who truly deserves the crown?</p>
  <div class="hero-rule"></div>
</div>

<!-- ═══ MAIN ═══ -->
<div class="page">

  <!-- RANKINGS PANEL -->
  <div class="panel active" id="panel-rankings">
    <div class="s-head">
      <span class="s-title">Live Standings</span>
      <span class="s-meta" id="total-label">— votes</span>
    </div>
    <div id="rankings-content">
      <div class="loading-state"><div class="spinner"></div>Loading rankings…</div>
    </div>
  </div>

  <!-- VOTE PANEL -->
  <div class="panel" id="panel-vote">
    <div class="vote-head">
      <div class="vote-title">Cast Your Vote</div>
      <p class="vote-sub">Choose a royal — one vote per person, forever.</p>
    </div>

    <div class="search-wrap">
      <span class="search-ico">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="8.5" cy="8.5" r="5.5"/><line x1="12.5" y1="12.5" x2="17" y2="17"/>
        </svg>
      </span>
      <input class="search-input" id="search-input" type="text"
        placeholder="Search by name…" autocomplete="off" oninput="filterCandidates()">
    </div>

    <div id="lbl-princes" class="cand-sec-label">Princes</div>
    <div class="cand-grid" id="grid-princes"></div>

    <div id="lbl-princesses" class="cand-sec-label">Princesses</div>
    <div class="cand-grid" id="grid-princesses"></div>

    <div class="no-results" id="no-results">No royals found for that search.</div>

    <!-- sticky bottom action bar -->
    <div class="vote-action">
      <button class="btn-primary" id="vote-btn" onclick="submitVote()" disabled>
        Select a Royal First
      </button>
      <span class="vote-selected-label" id="selected-label"></span>
      <div class="voted-badge" id="voted-badge">
        <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2">
          <polyline points="2,8 6,12 14,4"/>
        </svg>
        Vote recorded — thank you!
      </div>
    </div>
  </div>

</div><!-- /page -->

<div class="toast" id="toast"></div>

<!-- ═══════════════════════════════════════════
     FIREBASE + APP LOGIC
═══════════════════════════════════════════ -->
<script type="module">
import { initializeApp }   from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, doc, onSnapshot, runTransaction, increment }
                           from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

/* ─────────────────────────────────────────
   🔧 PASTE YOUR FIREBASE CONFIG BELOW
   Replace every "REPLACE_WITH_…" value.
   Find it in: Firebase Console → Project Settings → Your apps → SDK setup
───────────────────────────────────────── */
const firebaseConfig = {
  apiKey:            "AIzaSyAHMkMwjU4B78ItURh5rD2nvXyq4lFwzAs",
  authDomain:        "royalmog-a8a40.firebaseapp.com",
  projectId:         "royalmog-a8a40",
  storageBucket:     "royalmog-a8a40",
  messagingSenderId: "634535128872",
  appId:             "1:634535128872:web:fdad8b39807d9b53c7ea1d",
};

/* ─────────────────────────────────────────
   CANDIDATE DATA
   • image: path to image file in your repo (leave '' for no photo)
   • tiktok: their TikTok handle (with @)
   Update handles to real ones!
───────────────────────────────────────── */
const PRINCES = [
  { id:'paris',    name:'Paris',   image:'images/prince-paris.jpg',     tiktok:'@princeoffparis'     },
  { id:'sweden',   name:'Sweden',  image:'images/prince-sweden.jpg',     tiktok:'@sippeee_g'    },
  { id:'germany',  name:'Germany', image:'',     tiktok:'@princeoffgermanyy'   },
  { id:'holland',  name:'Holland', image:'',     tiktok:'@sjorshelenklaken'   },
  { id:'leeuw',    name:'Leeuwarden', image:'images/prince-leeuw.jpg', tiktok:'@nietsido'},
  { id:'dubai',    name:'Dubai',   image:'',     tiktok:'@bader_es1'     },
  { id:'italy',    name:'Italy',   image:'',    tiktok:'@picasso_jr_'     },
  { id:'norway',   name:'Norway',  image:'',    tiktok:'@princeaugusteezzz'    },
  { id:'brabant',  name:'Brabant', image:'',    tiktok:'@sunglassguy3'   },
  { id:'iraq',     name:'Iraq',    image:'',    tiktok:'@theprinceoffiraq'      },
  { id:'persia',   name:'Persia',  image:'images/prince-persia.jpg',    tiktok:'@clovis.fillion'     },
  { id:'miami',    name:'Miami',   image:'',    tiktok:'@calithekid1'     },
  { id:'egypt',    name:'Egypt',   image:'',    tiktok:'@princeegypt'     },
];
const PRINCESSES = [
  { id:'poland',   name:'Poland',   image:'',   tiktok:'@princessoffpoland'  },
  { id:'cannes',   name:'Cannes',   image:'',   tiktok:'@lyndaydl'  },
];
const ALL = [...PRINCES, ...PRINCESSES];

/* ─────────────────────────────────────────
   TIKTOK ICON
───────────────────────────────────────── */
const TT = `<svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.95a8.27 8.27 0 0 0 4.84 1.55V7.05a4.85 4.85 0 0 1-1.07-.36z"/></svg>`;

function ttUrl(handle) {
  const h = handle.startsWith('@') ? handle : '@'+handle;
  return `https://www.tiktok.com/${h}`;
}
function isPrincess(id) { return PRINCESSES.some(p => p.id === id); }

/* ─────────────────────────────────────────
   ANTI-ABUSE (client layer — Firebase rules are the real lock)
───────────────────────────────────────── */
const VOTED_KEY = 'rm_voted_v2';
const VOTE_TS   = 'rm_vote_ts_v2';
const RATE_MS   = 86_400_000; // 24 h

function hasVoted() { return !!localStorage.getItem(VOTED_KEY); }
function withinWindow() {
  const ts = parseInt(localStorage.getItem(VOTE_TS) || '0');
  return ts > 0 && (Date.now() - ts < RATE_MS);
}
function markVoted() {
  localStorage.setItem(VOTED_KEY, '1');
  localStorage.setItem(VOTE_TS, String(Date.now()));
}
function alreadyVoted() { return hasVoted() || withinWindow(); }

/* ─────────────────────────────────────────
   FIREBASE INIT
───────────────────────────────────────── */
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const VOTES_DOC = doc(db, 'royalmog', 'votes');

/* ─────────────────────────────────────────
   REAL-TIME RANKINGS
───────────────────────────────────────── */
onSnapshot(VOTES_DOC, snap => {
  renderRankings(snap.exists() ? snap.data() : {});
}, () => {
  document.getElementById('rankings-content').innerHTML =
    `<div class="empty-state"><span class="e-crown">♛</span>Could not load rankings.<br>Check your connection.</div>`;
});

function renderRankings(data) {
  const sorted = ALL.map(c => ({...c, v: data[c.id] || 0})).sort((a,b) => b.v - a.v);
  const tot    = sorted.reduce((s,c) => s + c.v, 0);
  const maxV   = Math.max(sorted[0]?.v || 1, 1);

  document.getElementById('total-label').textContent = `${tot} vote${tot!==1?'s':''}`;

  if (tot === 0) {
    document.getElementById('rankings-content').innerHTML =
      `<div class="empty-state"><span class="e-crown">♛</span>No votes yet.<br>Be the first to crown a royal.</div>`;
    return;
  }

  /* PODIUM */
  const top3 = sorted.slice(0, 3);
  const order = top3.length === 1 ? [null, top3[0], null]
              : top3.length === 2 ? [null, top3[0], top3[1]]
              : [top3[1], top3[0], top3[2]];
  const cls    = ['p2','p1','p3'];
  const medals = ['2nd Place','1st Place','3rd Place'];
  const glyphs = ['♙','♛','♜'];

  const podHTML = order.map((c,i) => {
    if (!c) return `<div class="pod" style="visibility:hidden"></div>`;
    const pct  = Math.round((c.v / tot) * 100);
    const type = isPrincess(c.id) ? 'Princess of' : 'Prince of';
    const imgBlock = c.image
      ? `<img src="${c.image}" alt="${c.name}" onerror="this.parentElement.innerHTML='<div class=&quot;pod-img-placeholder&quot;>${glyphs[i]}</div>'">`
      : `<div class="pod-img-placeholder">${glyphs[i]}</div>`;
    return `
      <div class="pod ${cls[i]}">
        <div class="pod-img-wrap">${imgBlock}</div>
        <div class="pod-medal-bar">
          <span class="pod-rank-badge">${medals[i]}</span>
        </div>
        <div class="pod-body">
          <div class="pod-type">${type}</div>
          <div class="pod-name">${c.name}</div>
          <div class="pod-votes">${c.v}</div>
          <div class="pod-pct">${pct}% of votes</div>
          <a class="tt-btn" href="${ttUrl(c.tiktok)}" target="_blank" rel="noopener noreferrer">
            ${TT} TikTok
          </a>
        </div>
      </div>`;
  }).join('');

  /* FULL LIST */
  const rest = sorted.slice(3);
  const listHTML = rest.map((c,i) => {
    const pct  = Math.round((c.v / tot) * 100);
    const barW = Math.round((c.v / maxV) * 100);
    return `
      <div class="rank-row" style="animation-delay:${i*.04}s">
        <div class="rank-num">${i+4}</div>
        <div>
          <div class="rank-name">${c.name}</div>
          <div class="rank-type">${isPrincess(c.id)?'Princess of':'Prince of'}</div>
        </div>
        <div class="rank-bar">
          <div class="rank-track"><div class="rank-fill" style="width:${barW}%"></div></div>
        </div>
        <div class="rank-pct">${pct}%</div>
        <a class="rank-tt" href="${ttUrl(c.tiktok)}" target="_blank" rel="noopener noreferrer">
          ${TT} TikTok
        </a>
      </div>`;
  }).join('');

  document.getElementById('rankings-content').innerHTML =
    `<div class="podium">${podHTML}</div>
     <div class="rank-list">${listHTML}</div>`;
}

/* ─────────────────────────────────────────
   VOTE GRID
───────────────────────────────────────── */
function buildGrid(gridId, list, princess) {
  const el = document.getElementById(gridId);
  el.innerHTML = list.map(c => {
    const imgBlock = c.image
      ? `<img src="${c.image}" alt="${c.name}" onerror="this.parentElement.innerHTML='<div class=\\"cand-no-img\\">${princess?'♛':'♔'}</div>'">`
      : `<div class="cand-no-img">${princess ? '♛' : '♔'}</div>`;
    return `
      <div class="cand-card" id="card-${c.id}" data-name="${c.name.toLowerCase()}">
        <div class="cand-check"><svg viewBox="0 0 10 8"><polyline points="1,4 4,7 9,1"/></svg></div>
        <div class="cand-img-wrap">${imgBlock}</div>
        <div class="cand-body">
          <div class="cand-type">${princess?'Princess of':'Prince of'}</div>
          <div class="cand-name">${c.name}</div>
          <div class="cand-footer">
            <span class="cand-select-hint">Tap to select</span>
            <a class="cand-tt" href="${ttUrl(c.tiktok)}" target="_blank" rel="noopener noreferrer" tabindex="0">
              ${TT} TikTok
            </a>
          </div>
        </div>
      </div>`;
  }).join('');

  list.forEach(c => {
    document.getElementById('card-'+c.id).addEventListener('click', e => {
      if (e.target.closest('.cand-tt')) return; // TikTok link: don't select
      selectCand(c.id);
    });
  });
}

/* ─────────────────────────────────────────
   SELECTION
───────────────────────────────────────── */
let selected = null;

function selectCand(id) {
  if (alreadyVoted()) { showToast('You have already cast your royal vote.', 'error'); return; }
  selected = selected === id ? null : id;
  document.querySelectorAll('.cand-card').forEach(el =>
    el.classList.toggle('selected', el.id === 'card-'+selected));
  const btn = document.getElementById('vote-btn');
  const lbl = document.getElementById('selected-label');
  if (selected) {
    const c = ALL.find(x => x.id === selected);
    btn.textContent = `Vote for ${c.name}`;
    btn.disabled = false;
    lbl.textContent = `Selected: ${c.name}`;
  } else {
    btn.textContent = 'Select a Royal First';
    btn.disabled = true;
    lbl.textContent = '';
  }
}

/* ─────────────────────────────────────────
   SUBMIT
───────────────────────────────────────── */
window.submitVote = async function() {
  if (!selected)       { showToast('Please select a candidate first.', 'error'); return; }
  if (alreadyVoted())  { showToast('You have already voted!', 'error'); return; }

  const candidateId = selected;
  const btn = document.getElementById('vote-btn');
  btn.disabled = true;
  btn.textContent = 'Casting…';

  try {
    await runTransaction(db, async tx => {
      if (!ALL.some(c => c.id === candidateId)) throw new Error('Invalid candidate');
      tx.set(VOTES_DOC, { [candidateId]: increment(1) }, { merge: true });
    });
    markVoted();
    const c = ALL.find(x => x.id === candidateId);
    showToast(`Your vote for ${c.name} has been cast. Long may they reign! ♛`, 'success');
    btn.style.display = 'none';
    document.getElementById('selected-label').textContent = '';
    document.getElementById('voted-badge').style.display = 'inline-flex';
    document.querySelectorAll('.cand-card').forEach(el => {
      el.style.pointerEvents = 'none';
      el.style.opacity = el.id === 'card-'+candidateId ? '1' : '.45';
    });
    selected = null;
  } catch(err) {
    console.error(err);
    showToast('Something went wrong. Please try again.', 'error');
    const c = ALL.find(x => x.id === candidateId);
    btn.disabled = false;
    btn.textContent = c ? `Vote for ${c.name}` : 'Select a Royal First';
  }
};

/* ─────────────────────────────────────────
   SEARCH / FILTER
───────────────────────────────────────── */
window.filterCandidates = function() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  let vP = 0, vPr = 0;
  PRINCES.forEach(c => {
    const hide = q && !c.name.toLowerCase().includes(q);
    document.getElementById('card-'+c.id).classList.toggle('hidden', hide);
    if (!hide) vP++;
  });
  PRINCESSES.forEach(c => {
    const hide = q && !c.name.toLowerCase().includes(q);
    document.getElementById('card-'+c.id).classList.toggle('hidden', hide);
    if (!hide) vPr++;
  });
  document.getElementById('lbl-princes').style.display    = vP  ? '' : 'none';
  document.getElementById('lbl-princesses').style.display = vPr ? '' : 'none';
  document.getElementById('no-results').style.display     = (!vP && !vPr) ? 'block' : 'none';
};

/* ─────────────────────────────────────────
   TOAST
───────────────────────────────────────── */
let toastT;
window.showToast = function(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 4500);
};

/* ─────────────────────────────────────────
   TAB SWITCH
───────────────────────────────────────── */
window.switchTab = function(id, btn) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
};

/* ─────────────────────────────────────────
   INIT
───────────────────────────────────────── */
buildGrid('grid-princes', PRINCES, false);
buildGrid('grid-princesses', PRINCESSES, true);

if (alreadyVoted()) {
  const btn = document.getElementById('vote-btn');
  btn.disabled = true; btn.style.display = 'none';
  document.getElementById('voted-badge').style.display = 'inline-flex';
  document.querySelectorAll('.cand-card').forEach(el => el.style.pointerEvents = 'none');
}
</script>
</body>
</html>
